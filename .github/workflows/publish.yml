name: Publish VizoTranslator SDK

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-sdk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@vizolabs'

      - name: Publish SDK
        working-directory: ./vizolabs-sdk/javascript
        run: |
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./vizolabs-api/Dockerfile
          push: true
          tags: |
            ghcr.io/vizolabs/vizotranslator-api:latest
            ghcr.io/vizolabs/vizotranslator-api:${{ github.ref_name }}

  publish-docker-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./vizolabs-web/Dockerfile
          push: true
          tags: |
            ghcr.io/vizolabs/vizotranslator-web:latest
            ghcr.io/vizolabs/vizotranslator-web:${{ github.ref_name }}
