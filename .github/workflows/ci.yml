name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test-api:
    name: Lint & Test API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vizolabs-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: vizolabs-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

  lint-and-test-web:
    name: Lint & Test Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vizolabs-web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: vizolabs-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-test-api, lint-and-test-web]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build -f vizolabs-api/Dockerfile -t vizolabs/api:latest .

      - name: Build Web image
        run: |
          docker build -f vizolabs-web/Dockerfile -t vizolabs/web:latest .

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Deploy to Railway
        run: |
          echo "Deploying to staging..."
          # Add your deployment commands here

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to Vercel
        run: |
          echo "Deploying to production..."
          # Add your deployment commands here
